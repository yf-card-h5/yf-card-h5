<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>YF卡密自动发货</title>
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }
 
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 min-height: 100vh;
 padding: 20px 10px;
 }
 
 .container {
 max-width: 500px;
 margin: 0 auto;
 }
 
 .header {
 text-align: center;
 color: white;
 margin-bottom: 30px;
 padding: 20px 0;
 }
 
 .header h1 {
 font-size: 28px;
 margin-bottom: 10px;
 text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
 }
 
 .header p {
 font-size: 14px;
 opacity: 0.9;
 }
 
 .product-card {
 background: white;
 border-radius: 15px;
 padding: 20px;
 box-shadow: 0 10px 30px rgba(0,0,0,0.2);
 margin-bottom: 15px;
 }
 
 .product-name {
 font-size: 18px;
 font-weight: bold;
 color: #333;
 margin-bottom: 10px;
 }
 
 .product-desc {
 font-size: 14px;
 color: #666;
 margin-bottom: 15px;
 line-height: 1.6;
 }
 
 .product-footer {
 display: flex;
 justify-content: space-between;
 align-items: center;
 }
 
 .product-price {
 font-size: 24px;
 font-weight: bold;
 color: #667eea;
 }
 
 .product-price::before {
 content: '¥';
 font-size: 16px;
 }
 
 .product-price::after {
 content: '/天';
 font-size: 14px;
 color: #999;
 }
 
 .buy-btn {
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 color: white;
 border: none;
 padding: 12px 30px;
 border-radius: 25px;
 font-size: 16px;
 font-weight: bold;
 cursor: pointer;
 box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
 }
 
 .buy-btn:active {
 transform: scale(0.95);
 }
 
 .modal {
 display: none;
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 background: rgba(0,0,0,0.5);
 z-index: 1000;
 align-items: center;
 justify-content: center;
 }
 
 .modal.active {
 display: flex;
 }
 
 .modal-content {
 background: white;
 border-radius: 15px;
 padding: 25px;
 max-width: 90%;
 width: 350px;
 text-align: center;
 max-height: 90vh;
 overflow-y: auto;
 }
 
 .pay-options {
 display: flex;
 flex-direction: column;
 gap: 15px;
 margin-top: 20px;
 }
 
 .pay-btn {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 10px;
 padding: 15px;
 border: none;
 border-radius: 10px;
 font-size: 16px;
 font-weight: bold;
 cursor: pointer;
 transition: transform 0.2s;
 }
 
 .pay-btn:active {
 transform: scale(0.98);
 }
 
 .pay-wechat {
 background: #07c160;
 color: white;
 }
 
 .pay-alipay {
 background: #1677ff;
 color: white;
 }
 
 .qrcode-container {
 margin: 20px 0;
 }
 
 .qrcode-container img {
 width: 200px;
 height: 200px;
 border-radius: 10px;
 box-shadow: 0 5px 15px rgba(0,0,0,0.1);
 }
 
 .qrcode-tip {
 margin-top: 15px;
 color: #666;
 font-size: 14px;
 line-height: 1.6;
 }
 
 .confirm-pay-btn {
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 color: white;
 border: none;
 padding: 12px 40px;
 border-radius: 25px;
 font-size: 16px;
 font-weight: bold;
 cursor: pointer;
 margin-top: 20px;
 }
 
 .back-btn {
 background: #f0f0f0;
 color: #666;
 border: none;
 padding: 10px 30px;
 border-radius: 20px;
 font-size: 14px;
 cursor: pointer;
 margin-top: 10px;
 }
 
 .toast {
 position: fixed;
 top: 20px;
 left: 50%;
 transform: translateX(-50%);
 background: rgba(0,0,0,0.8);
 color: white;
 padding: 12px 24px;
 border-radius: 25px;
 font-size: 14px;
 z-index: 2000;
 opacity: 0;
 transition: opacity 0.3s;
 }
 
 .toast.show {
 opacity: 1;
 }
 
 .order-info {
 background: #f8f9fa;
 padding: 15px;
 border-radius: 10px;
 margin: 15px 0;
 text-align: left;
 }
 
 .order-info p {
 margin: 5px 0;
 font-size: 14px;
 color: #333;
 }
 
 .order-info .label {
 color: #666;
 }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1>🎁 YF卡密自动发货</h1>
 <p>自动发货 · 即时到账 · 24小时服务</p>
 </div>
 
 <div class="product-card">
 <div class="product-name">YF会员卡</div>
 <div class="product-desc">✅ 天卡，24小时有效<br>✅ 自动发货，即时到账<br>✅ 支持微信/支付宝</div>
 <div class="product-footer">
 <div class="product-price">60</div>
 <button class="buy-btn" onclick="buyProduct()">立即购买</button>
 </div>
 </div>
 </div>
 
 <!-- 支付选择弹窗 -->
 <div class="modal" id="payModal">
 <div class="modal-content">
 <h2>选择支付方式</h2>
 <p>请选择微信或支付宝支付 ¥60</p>
 <div class="pay-options">
 <button class="pay-btn pay-wechat" onclick="showQRCode('wechat')">
 <span class="pay-icon">💬</span>
 微信支付
 </button>
 <button class="pay-btn pay-alipay" onclick="showQRCode('alipay')">
 <span class="pay-icon">💙</span>
 支付宝支付
 </button>
 </div>
 <button class="back-btn" onclick="closeModal('payModal')">取消</button>
 </div>
 </div>
 
 <!-- 微信收款码弹窗 -->
 <div class="modal" id="wechatModal">
 <div class="modal-content">
 <h2>微信支付</h2>
 <div class="qrcode-container">
 <img src="图片/图片/wechat.jpg" alt="微信收款码" onerror="this.src=''">
 </div>
 <p class="qrcode-tip">请使用微信扫一扫<br>支付 ¥60</p>
 <button class="confirm-pay-btn" onclick="confirmPay('wechat')">我已完成支付</button>
 <br
