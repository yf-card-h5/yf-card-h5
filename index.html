<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YF卡密自动发货</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 10px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; padding: 20px 0; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        .product-title { font-size: 18px; color: #333; margin-bottom: 10px; }
        .product-price { font-size: 32px; color: #ff6b6b; font-weight: bold; }
        .product-price span { font-size: 16px; }
        .pay-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .pay-btn:hover { transform: translateY(-2px); }
        .wechat-pay { background: #07c160; color: white; }
        .alipay-pay { background: #1677ff; color: white; margin-top: 10px; }
        .card-result {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        .card-code {
            font-size: 24px;
            color: #333;
            font-weight: bold;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
        }
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 YF卡密自动发货</h1>
            <p>购买后立即自动获取卡密</p>
        </div>
        
        <div class="product-card">
            <div class="product-title">YF会员 - 月卡</div>
            <div class="product-price">¥60<span>/月</span></div>
            <p style="color:#666;margin-top:10px;">✓ 即时发货 ✓ 自动获取 ✓ 24小时有效</p>
            
            <button class="pay-btn wechat-pay" onclick="createOrder('wechat')">💚 微信支付</button>
            <button class="pay-btn alipay-pay" onclick="createOrder('alipay')">💙 支付宝支付</button>
        </div>
        
        <div class="loading" id="loading">
            <p>正在处理...</p>
        </div>
        
        <div class="card-result" id="result">
            <h3>🎉 购买成功！</h3>
            <p>您的卡密：</p>
            <div class="card-code" id="cardCode"></div>
            <button class="copy-btn" onclick="copyCard()">📋 复制卡密</button>
            <p style="margin-top:15px;color:#666;font-size:14px;">请妥善保存，卡密仅显示一次</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://122.51.102.171:3001';
        
        async function createOrder(payType) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                const res = await fetch(`${API_BASE}/api/order/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: 'yf-month', payType: payType })
                });
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                
                if (data.code === 0) {
                    document.getElementById('cardCode').textContent = data.data.cardCode;
                    document.getElementById('result').style.display = 'block';
                } else {
                    alert('购买失败：' + data.msg);
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                alert('网络错误，请稍后重试');
            }
        }
        
        function copyCard() {
            const code = document.getElementById('cardCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('卡密已复制！');
            });
        }
    </script>
</body>
</html>
